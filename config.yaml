# Config Interactive Park AI

video_source: "assets/videos/sample.mp4" # Path to video file or webcam index (0)
target_fps: 30

models:
  person_model: "models/yolo11n.pt"
  pose_model: "models/yolo11n-pose.pt"
  confidence_threshold: 0.5

plant_zones:
  left:
    name: "LEFT_PLANT"
    color: [0, 0, 255] # Red in BGR
    show_overlay: false  # Set true to visualize the zone boundary
    polygon:
      - [0, 50]
      - [400, 50]
      - [200, 700]
      - [0, 700]
  right:
    name: "RIGHT_PLANT"
    color: [255, 0, 0] # Blue in BGR
    show_overlay: false  # Set true to visualize the zone boundary
    polygon:
      - [880, 50]
      - [1280, 50]
      - [1280, 700]
      - [1080, 700]

audio:
  # Placeholder (Milestone 5)
  ambience: "assets/audio/ambience.ogg"
  plant_touch: "assets/audio/plant.ogg"
  cooldown_seconds: 5
